<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>绘本故事</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f4f5f7;
    color: #18191c;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ===== Banner ===== */
  .banner {
    position: relative;
    overflow: hidden;
  }
  .banner-bg {
    position: relative;
    width: 100%;
    height: 220px;
  }
  .banner-bg svg { width: 100%; height: 100%; display: block; }

  /* 文字叠在插画上方 */
  .banner-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 60px 20px 20px;
    background: linear-gradient(transparent 0%, rgba(0,0,0,0.45) 100%);
  }
  .banner-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  }
  .banner-sub {
    margin-top: 5px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  /* 返回按钮 */
  .btn-back {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,0.25); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; transition: background 0.15s;
  }
  .btn-back:active { background: rgba(0,0,0,0.4); }
  .btn-back svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; }

  /* 统计条 */
  .stats-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
  }
  .stats-tag {
    padding: 4px 12px; border-radius: 16px;
    font-size: 12px; font-weight: 500; color: #fff;
  }
  .stats-text { font-size: 12px; color: #9499a0; }

  /* ===== 瀑布流 ===== */
  .waterfall {
    display: flex;
    padding: 10px;
    gap: 8px;
    align-items: flex-start;
    padding-bottom: 40px;
  }
  .waterfall-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ===== 卡片 ===== */
  .card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:active { transform: scale(0.97); }

  .card-cover {
    position: relative;
    width: 100%;
    padding-top: 62.5%;
    overflow: hidden;
    background: #2a2520;
  }
  .card-cover img {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .card-cover img.vertical {
    object-fit: contain;
    transition: transform 0.3s;
  }
  .card:hover .card-cover img { transform: scale(1.03); }

  .card-cover::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 36px;
    background: linear-gradient(transparent, rgba(0,0,0,0.4));
    pointer-events: none;
  }

  .card-duration {
    position: absolute; bottom: 5px; right: 6px; z-index: 2;
    color: #fff; font-size: 10px; font-weight: 500;
    padding: 1px 5px; border-radius: 3px;
    background: rgba(0,0,0,0.5);
    letter-spacing: 0.3px;
  }

  .card-badge {
    position: absolute; top: 6px; left: 6px; z-index: 2;
    display: inline-flex; align-items: center; gap: 2px;
    padding: 2px 7px;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff; font-size: 9px; font-weight: 600;
    border-radius: 3px;
    box-shadow: 0 1px 3px rgba(238,90,36,0.35);
  }
  .card-badge svg { width: 9px; height: 9px; fill: #fff; }

  .card-info { padding: 8px 8px 10px; }
  .card-title {
    font-size: 13px; font-weight: 500; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; word-break: break-word;
  }
  .card-meta {
    display: flex; align-items: center;
    margin-top: 6px; font-size: 10px; color: #9499a0;
  }
  .card-up {
    display: flex; align-items: center;
    flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .card-avatar {
    width: 16px; height: 16px; margin-right: 4px;
    flex-shrink: 0; font-size: 11px; line-height: 1;
  }
  .card-views {
    flex-shrink: 0; margin-left: 6px;
    display: flex; align-items: center;
  }
  .card-views svg { width: 12px; height: 12px; margin-right: 2px; fill: #bbb; }
</style>
</head>
<body>

<div class="banner" id="banner">
  <a class="btn-back" href="picture_book.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </a>
  <div class="banner-bg" id="banner-bg"></div>
  <div class="banner-overlay">
    <div class="banner-title" id="b-title"></div>
    <div class="banner-sub" id="b-sub"></div>
  </div>
</div>

<div class="stats-bar">
  <span class="stats-tag" id="s-tag"></span>
  <span class="stats-text" id="s-text"></span>
</div>

<div class="waterfall">
  <div class="waterfall-col" id="col-left"></div>
  <div class="waterfall-col" id="col-right"></div>
</div>

<script src="theme_data.js"></script>
<script>
const AVATARS = ['\ud83d\udc30','\ud83d\udc3b','\ud83d\udc31','\ud83e\udd8a','\ud83d\udc3c','\ud83d\udc28','\ud83d\udc36','\ud83d\udc2f','\ud83e\udd81','\ud83d\udc2e','\ud83d\udc37','\ud83d\udc38','\ud83d\udc19','\ud83e\udd84','\ud83d\udc1d','\ud83d\udc27','\ud83d\udc39','\ud83d\udc23'];
const THEME_EMOJI = { goodnight:'\ud83c\udf19', family:'\ud83c\udfe0', habit:'\u2b50', social:'\ud83e\udd1d', emotion:'\ud83d\udc9c', self:'\ud83c\udf08' };

function hashCode(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return h;}
function getAvatar(n){return AVATARS[Math.abs(hashCode(n))%AVATARS.length];}
function fmtViews(n){return n>=10000?(n/10000).toFixed(1)+'万':n>=1000?(n/1000).toFixed(1)+'千':n.toString();}

function mockCover(title,colors){
  const c=colors||['#667eea','#764ba2'];
  const i=Math.abs(hashCode(title))%c.length;
  const c1=c[i],c2=c[(i+1)%c.length];
  return `data:image/svg+xml,${encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="225">
      <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:${c1}"/>
        <stop offset="100%" style="stop-color:${c2}"/>
      </linearGradient></defs>
      <rect fill="url(#g)" width="400" height="225"/>
      <g transform="translate(165,72)" fill="rgba(255,255,255,0.2)">
        <path d="M9.5 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10.5 8.84 10.5 13.15s-2.51 8.07-5.99 9.8c1.47.85 3.18 1.35 5 1.35 5.52 0 10-4.48 10-10S15.02 2 9.5 2z" transform="scale(3)"/>
      </g>
    </svg>`)}`;
}

function makeBannerSvg(c) {
  return `<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c[0]}"/><stop offset="50%" stop-color="${c[1]}"/>
      <stop offset="80%" stop-color="${c[2]}"/><stop offset="100%" stop-color="${c[3]}"/>
    </linearGradient></defs>
    <rect fill="url(#sky)" width="400" height="220"/>

    <!-- 星星 -->
    <circle cx="28" cy="22" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="75" cy="48" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="135" cy="16" r="1.8" fill="#fff" opacity="0.7"/>
    <circle cx="195" cy="38" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="248" cy="12" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="308" cy="32" r="1.2" fill="#fff" opacity="0.8"/>
    <circle cx="350" cy="18" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="55" cy="62" r="0.8" fill="#fff" opacity="0.3"/>
    <circle cx="170" cy="55" r="1.2" fill="#fff" opacity="0.6"/>
    <circle cx="278" cy="25" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="368" cy="45" r="0.8" fill="#fff" opacity="0.4"/>

    <!-- 闪烁星 -->
    <circle cx="98" cy="28" r="2" fill="#ffe082" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="296" cy="20" r="1.8" fill="#ffe082" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="218" cy="10" r="1.5" fill="#ffe082" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- 月亮 -->
    <circle cx="325" cy="55" r="30" fill="#fdd835"/>
    <circle cx="336" cy="48" r="26" fill="${c[0]}"/>
    <circle cx="325" cy="55" r="38" fill="none" stroke="#fdd835" stroke-width="0.4" opacity="0.25"/>
    <circle cx="325" cy="55" r="46" fill="none" stroke="#fdd835" stroke-width="0.3" opacity="0.12"/>

    <!-- 远山 -->
    <path d="M0 168 Q45 138 95 152 Q145 128 195 148 Q245 132 295 145 Q345 125 400 142 L400 220 L0 220Z" fill="${c[1]}" opacity="0.5"/>
    <path d="M0 178 Q55 152 115 165 Q175 148 235 160 Q295 145 355 156 Q378 152 400 155 L400 220 L0 220Z" fill="${c[2]}" opacity="0.5"/>

    <!-- 小房子 -->
    <rect x="78" y="162" width="28" height="22" rx="2" fill="${c[1]}" opacity="0.8"/>
    <polygon points="75,164 92,148 109,164" fill="${c[2]}" opacity="0.8"/>
    <rect x="86" y="168" width="7" height="7" rx="1" fill="#fdd835" opacity="0.65"/>
    <rect x="96" y="169" width="4" height="4" rx="0.5" fill="#fdd835" opacity="0.35"/>

    <!-- 树 -->
    <rect x="140" y="162" width="4" height="22" fill="${c[1]}" opacity="0.7"/>
    <circle cx="142" cy="154" r="14" fill="${c[2]}" opacity="0.6"/>
    <circle cx="135" cy="158" r="9" fill="${c[1]}" opacity="0.5"/>
    <circle cx="150" cy="156" r="10" fill="${c[2]}" opacity="0.5"/>

    <!-- 近景 -->
    <path d="M0 185 Q95 172 195 180 Q295 170 400 178 L400 220 L0 220Z" fill="${c[2]}" opacity="0.7"/>

    <!-- 小熊 -->
    <g transform="translate(225,158)">
      <ellipse cx="18" cy="22" rx="16" ry="12" fill="#8d6e63"/>
      <circle cx="6" cy="14" r="10" fill="#8d6e63"/>
      <circle cx="-1" cy="7" r="4.5" fill="#8d6e63"/><circle cx="-1" cy="7" r="2.5" fill="#a1887f"/>
      <circle cx="12" cy="4" r="4.5" fill="#8d6e63"/><circle cx="12" cy="4" r="2.5" fill="#a1887f"/>
      <ellipse cx="20" cy="23" rx="10" ry="8" fill="#a1887f"/>
      <path d="M2 14 Q5 16 8 14" fill="none" stroke="#4e342e" stroke-width="1" stroke-linecap="round"/>
      <ellipse cx="3" cy="17" rx="2" ry="1.8" fill="#5d4037"/>
      <path d="M2 19 Q4 20.5 6 19" fill="none" stroke="#5d4037" stroke-width="0.7" stroke-linecap="round"/>
      <path d="M8 18 Q17 13 34 19 Q36 26 34 31 Q17 34 8 28Z" fill="#7986cb" opacity="0.65"/>
      <text x="36" y="6" fill="#fff" opacity="0.4" font-size="7" font-family="sans-serif">z</text>
      <text x="41" y="1" fill="#fff" opacity="0.3" font-size="5.5" font-family="sans-serif">z</text>
      <text x="45" y="-3" fill="#fff" opacity="0.2" font-size="4" font-family="sans-serif">z</text>
    </g>
  </svg>`;
}

// 解析参数
const params = new URLSearchParams(location.search);
const key = params.get('theme') || 'goodnight';
const theme = THEME_DATA[key];

if(!theme){ document.body.innerHTML='<p style="padding:60px;text-align:center;color:#999">主题不存在</p>'; }
else {
  const emoji = THEME_EMOJI[key] || '\ud83d\udcd6';
  document.title = `绘本故事 · ${theme.title}`;

  // Banner
  document.getElementById('banner-bg').innerHTML = makeBannerSvg(theme.color);
  document.getElementById('b-title').textContent = `${emoji} ${theme.title}`;
  document.getElementById('b-sub').textContent = theme.subtitle;

  // 统计条
  const tagEl = document.getElementById('s-tag');
  tagEl.textContent = `${theme.articles.length} 个稿件`;
  tagEl.style.background = `linear-gradient(135deg, ${theme.color[1]}, ${theme.color[3]})`;
  const collectionCount = theme.articles.filter(a=>a.is_collection).length;
  document.getElementById('s-text').textContent =
    collectionCount > 0 ? `其中 ${collectionCount} 个为合集` : '精选优质绘本内容';

  // 瀑布流
  const colL = document.getElementById('col-left');
  const colR = document.getElementById('col-right');
  let lH=0, rH=0;

  theme.articles.forEach(item => {
    const el = document.createElement('a');
    el.className = 'card';
    el.href = item.url;
    el.target = '_blank';

    const cover = item.cover || mockCover(item.title, theme.color);
    const badge = item.is_collection
      ? `<span class="card-badge"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>合集</span>` : '';

    el.innerHTML = `
      <div class="card-cover">
        <img src="${cover}" alt="" loading="lazy">
        ${badge}
        <span class="card-duration">${item.duration}</span>
      </div>
      <div class="card-info">
        <div class="card-title">${item.title}</div>
        <div class="card-meta">
          <span class="card-up">
            <span class="card-avatar">${getAvatar(item.up_name)}</span>
            ${item.up_name}
          </span>
          <span class="card-views">
            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            ${fmtViews(item.views)}
          </span>
        </div>
      </div>`;

    if(lH <= rH){ colL.appendChild(el); lH++; } else { colR.appendChild(el); rH++; }
  });
}
function fixVerticalCovers(){
  document.querySelectorAll('.card-cover img').forEach(function(img){
    if(img.naturalWidth>0 && img.naturalHeight>img.naturalWidth*1.1){
      img.classList.add('vertical');
    }
  });
}
window.addEventListener('load', fixVerticalCovers);
setTimeout(fixVerticalCovers, 2000);
setTimeout(fixVerticalCovers, 5000);
</script>
</body>
</html>
